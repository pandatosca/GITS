<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - GITS Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #2c336b; /* Warna biru gelap menyesuaikan dengan logo/gambar */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }

        .maintenance-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .illustration {
            width: 100%;
            max-width: 500px; /* Ukuran proporsional di desktop */
            height: auto;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
            color: #2c336b;
        }

        p {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.6;
            color: #5a618e;
            max-width: 650px;
            margin: 0 auto;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .illustration {
                max-width: 350px;
                margin-bottom: 30px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
                padding: 0 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <img src="data:image/svg+xml,%3Csvg viewBox='0 0 341 221' xmlns='http://www.w3.org/2000/svg'%3E...%3C/svg%3E" alt="Under Maintenance" class="illustration">
        
        <h1>We’re Crafting<br>Something Better</h1>
        <p>Our website is currently under maintenance while we prepare something smarter, faster, and more inspiring. Thank you for your patience — we’ll be back soon.</p>
    </div>

</body>
</html>
